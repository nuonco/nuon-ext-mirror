version: 2

builds:
  - id: nuon-ext-mirror
    main: .
    binary: nuon-ext-mirror
    ldflags:
      - -s -w -X github.com/nuonco/nuon-ext-mirror/cmd.BuildVersion={{ .Version }}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: nuon-ext-mirror
    builds:
      - nuon-ext-mirror
    format: tar.gz
    name_template: "nuon-ext-mirror-{{ .Os }}-{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
